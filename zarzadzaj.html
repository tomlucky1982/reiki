<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zarządzaj menu | Reiki</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --line: #000000;
      --soft: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Times New Roman", Georgia, serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 28px;
    }

    .panel {
      border: 1.5px solid #000;
      padding: 22px;
      background: #fff;
    }

    .panel-title {
      margin: 0 0 18px;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-family: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 1px solid #000;
      background: #000;
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.92rem;
      font-family: inherit;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    button:hover {
      background: #fff;
      color: #000;
    }

    button.secondary {
      background: #fff;
      color: #000;
    }

    button.secondary:hover {
      background: #000;
      color: #fff;
    }

    .items {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      border: 1px solid #000;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .item strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .item span {
      font-size: 0.94rem;
      word-break: break-all;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .item-actions button {
      padding: 8px 10px;
      font-size: 0.78rem;
    }

    .preview {
      border: 1.5px solid #000;
      background: #fff;
      margin-bottom: 22px;
    }

    .preview-header {
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 20px;
      border-bottom: 2px solid #000;
    }

    .preview-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #000;
      flex-shrink: 0;
    }

    .preview-brand img {
      height: 52px;
      width: auto;
      display: block;
    }

    .preview-menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .preview-menu a {
      color: #000;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 6px;
    }

    .preview-menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1.5px;
      background: #000;
    }

    .preview-menu a.active::after {
      width: 100%;
    }

    .preview-body {
      padding: 24px 20px;
      color: #333;
      line-height: 1.8;
    }

    .code-label {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      border: 1px solid #000;
      padding: 14px;
      resize: vertical;
      background: #fff;
      color: #000;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .note {
      margin-top: 12px;
      padding: 12px 14px;
      border-left: 3px solid #000;
      background: var(--soft);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .preview-header {
        flex-direction: column;
        align-items: flex-start;
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Zarządzaj menu</h1>

    <div class="layout">
      <section class="panel">
        <h2 class="panel-title">Dodaj lub edytuj pozycję</h2>

        <div class="field">
          <label for="labelInput">Nazwa</label>
          <input id="labelInput" type="text" placeholder="np. REIKI" />
        </div>

        <div class="field">
          <label for="urlInput">Link</label>
          <input id="urlInput" type="text" placeholder="np. reiki.html" />
        </div>

        <div class="actions">
          <button id="saveItemBtn">Dodaj pozycję</button>
          <button id="cancelEditBtn" class="secondary" style="display:none;">Anuluj edycję</button>
          <button id="resetBtn" class="secondary">Przywróć startowe</button>
          <button id="clearBtn" class="secondary">Wyczyść wszystko</button>
        </div>

        <div class="items" id="itemsList"></div>
      </section>

      <section>
        <div class="preview">
          <div class="preview-header">
            <a href="#" class="preview-brand">
              <img src="reiki.png" alt="Reiki" onerror="this.style.display='none'">
              <img src="napis.png" alt="Reiki Usui Shiki Ryoho" onerror="this.style.display='none'">
            </a>
            <nav class="preview-menu" id="previewMenu"></nav>
          </div>
          <div class="preview-body">
            Podgląd pokazuje, jak menu będzie wyglądało po prawej stronie nagłówka.
          </div>
        </div>

        <div class="panel">
          <h2 class="code-label">Kod do menu.js</h2>
          <textarea id="codeOutput" readonly></textarea>

          <div class="actions">
            <button id="copyBtn">Kopiuj kod</button>
            <button id="saveLocalBtn" class="secondary">Zapisz ustawienie lokalnie</button>
          </div>

          <div class="note">
            Ta strona zapamiętuje menu w tej przeglądarce. Po wejściu ponownie zobaczysz ostatnie ustawienie.
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "reiki_menu_builder_v2";

    const defaultItems = [
      { label: "START", url: "index.html" },
      { label: "REIKI", url: "reiki.html" },
      { label: "MISTRZ", url: "mistrz.html" },
      { label: "MATERIAŁY", url: "materialy.html" },
      { label: "KONTAKT", url: "kontakt.html" }
    ];

    let items = [];
    let editIndex = null;

    const labelInput = document.getElementById("labelInput");
    const urlInput = document.getElementById("urlInput");
    const saveItemBtn = document.getElementById("saveItemBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const saveLocalBtn = document.getElementById("saveLocalBtn");
    const itemsList = document.getElementById("itemsList");
    const previewMenu = document.getElementById("previewMenu");
    const codeOutput = document.getElementById("codeOutput");

    function saveToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function loadFromLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) {
            items = parsed;
            return;
          }
        }
      } catch (e) {}

      items = [...defaultItems];
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function generateMenuCode() {
      return `document.addEventListener("DOMContentLoaded", function () {
  const menu = document.getElementById("site-menu");
  if (!menu) return;

  const items = ${JSON.stringify(items, null, 2)};
  const currentPage = window.location.pathname.split("/").pop() || "index.html";

  menu.innerHTML = items.map(item => {
    const active = currentPage === item.url ? "active" : "";
    return \`<a href="\${item.url}" class="\${active}">\${item.label}</a>\`;
  }).join("");
});`;
    }

    function renderPreview() {
      previewMenu.innerHTML = items.map((item, index) => {
        const active = index === 0 ? "active" : "";
        return `<a href="${escapeHtml(item.url)}" class="${active}">${escapeHtml(item.label)}</a>`;
      }).join("");
    }

    function renderList() {
      if (!items.length) {
        itemsList.innerHTML = '<div class="note">Brak pozycji w menu.</div>';
        return;
      }

      itemsList.innerHTML = items.map((item, index) => `
        <div class="item">
          <div>
            <strong>${escapeHtml(item.label)}</strong>
            <span>${escapeHtml(item.url)}</span>
          </div>
          <div class="item-actions">
            <button class="secondary" onclick="moveUp(${index})">↑</button>
            <button class="secondary" onclick="moveDown(${index})">↓</button>
            <button class="secondary" onclick="editItem(${index})">Edytuj</button>
            <button onclick="removeItem(${index})">Usuń</button>
          </div>
        </div>
      `).join("");
    }

    function renderCode() {
      codeOutput.value = generateMenuCode();
    }

    function renderAll() {
      renderList();
      renderPreview();
      renderCode();
      saveToLocal();
    }

    function resetForm() {
      labelInput.value = "";
      urlInput.value = "";
      editIndex = null;
      saveItemBtn.textContent = "Dodaj pozycję";
      cancelEditBtn.style.display = "none";
    }

    function validateInputs() {
      const label = labelInput.value.trim();
      const url = urlInput.value.trim();

      if (!label || !url) {
        alert("Uzupełnij nazwę i link.");
        return null;
      }

      return { label, url };
    }

    saveItemBtn.addEventListener("click", () => {
      const data = validateInputs();
      if (!data) return;

      if (editIndex === null) {
        items.push(data);
      } else {
        items[editIndex] = data;
      }

      renderAll();
      resetForm();
    });

    cancelEditBtn.addEventListener("click", resetForm);

    saveLocalBtn.addEventListener("click", () => {
      saveToLocal();
      alert("Ustawienie menu zapisane lokalnie.");
    });

    resetBtn.addEventListener("click", () => {
      items = [...defaultItems];
      renderAll();
      resetForm();
    });

    clearBtn.addEventListener("click", () => {
      if (!confirm("Na pewno usunąć wszystkie pozycje menu?")) return;
      items = [];
      renderAll();
      resetForm();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(codeOutput.value);
        alert("Kod został skopiowany.");
      } catch (e) {
        alert("Nie udało się skopiować automatycznie. Skopiuj ręcznie z pola.");
      }
    });

    window.editItem = function(index) {
      const item = items[index];
      labelInput.value = item.label;
      urlInput.value = item.url;
      editIndex = index;
      saveItemBtn.textContent = "Zapisz zmiany";
      cancelEditBtn.style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.removeItem = function(index) {
      items.splice(index, 1);
      renderAll();
      if (editIndex === index) resetForm();
    };

    window.moveUp = function(index) {
      if (index === 0) return;
      [items[index - 1], items[index]] = [items[index], items[index - 1]];
      renderAll();
    };

    window.moveDown = function(index) {
      if (index === items.length - 1) return;
      [items[index + 1], items[index]] = [items[index], items[index + 1]];
      renderAll();
    };

    loadFromLocal();
    renderAll();
    resetForm();
  </script>
</body>
</html>
