<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zarządzaj menu | Reiki</title>

  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Georgia, serif;
      background: #fff;
      color: #000;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .field {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #000;
      font-size: 1rem;
    }

    button {
      border: 1px solid #000;
      background: #000;
      color: #fff;
      padding: 10px 15px;
      margin-right: 10px;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #000;
    }

    .list {
      margin-top: 30px;
    }

    .item {
      border: 1px solid #000;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      border: 1px solid #000;
      padding: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Zarządzaj menu</h1>

  <div class="field">
    <input id="label" placeholder="Nazwa (np. Reiki)" />
  </div>

  <div class="field">
    <input id="url" placeholder="Link (np. reiki.html)" />
  </div>

  <button onclick="add()">Dodaj</button>
  <button class="secondary" onclick="clearAll()">Wyczyść</button>

  <div class="list" id="list"></div>

  <h2>Kod do menu.js</h2>
  <textarea id="output" readonly></textarea>

</div>

<script>
let items = [];

function render() {
  const list = document.getElementById("list");

  list.innerHTML = items.map((item, i) => `
    <div class="item">
      <div>${item.label} → ${item.url}</div>
      <button onclick="remove(${i})">Usuń</button>
    </div>
  `).join("");

  generateCode();
}

function add() {
  const label = document.getElementById("label").value.trim();
  const url = document.getElementById("url").value.trim();

  if (!label || !url) {
    alert("Uzupełnij dane");
    return;
  }

  items.push({ label, url });

  document.getElementById("label").value = "";
  document.getElementById("url").value = "";

  render();
}

function remove(i) {
  items.splice(i, 1);
  render();
}

function clearAll() {
  items = [];
  render();
}

function generateCode() {
  const code = `document.addEventListener("DOMContentLoaded", function () {
  const menu = document.getElementById("site-menu");
  if (!menu) return;

  const items = ${JSON.stringify(items, null, 2)};
  const currentPage = window.location.pathname.split("/").pop() || "index.html";

  menu.innerHTML = items.map(item => {
    const active = currentPage === item.url ? "active" : "";
    return \`<a href="\${item.url}" class="\${active}">\${item.label}</a>\`;
  }).join("");
});`;

  document.getElementById("output").value = code;
}
</script>

</body>
</html>
