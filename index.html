<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reiki</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      text-align: center;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-images {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      width: max-content;
      max-width: 100%;
    }

    .top-images img {
      height: 140px;
      width: auto;
      display: block;
    }

    .description {
      font-size: 1.2rem;
      line-height: 1.7;
      margin: 0 auto 36px;
      text-align: center;

      /* KLUCZOWE */
      font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
    }

    .enter-button {
      display: inline-block;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 34px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .enter-button:hover {
      opacity: 0.85;
    }

    @media (max-width: 640px) {
      .top-images {
        gap: 14px;
      }

      .top-images img {
        height: 90px;
      }

      .description {
        font-size: 1.05rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="brand-block">

      <div class="top-images" id="topImages">
        <img src="reiki.png" alt="Reiki" />
        <img src="napis.png" alt="Reiki Usui Shiki Ryoho" />
      </div>

      <div class="description" id="description">
        Reiki to Uniwersalna Energia Życia odkryta ponownie na początku dwudziestego wieku przez dr Mikao Usui.
      </div>

      <a href="reiki.html" class="enter-button">Wejdź</a>

    </div>
  </div>

  <!-- DOPASOWANIE SZEROKOŚCI DO LOGO -->
  <script>
    function syncWidth() {
      const top = document.getElementById("topImages");
      const desc = document.getElementById("description");

      if (!top || !desc) return;

      desc.style.width = top.offsetWidth + "px";
      desc.style.maxWidth = "100%";
    }

    window.addEventListener("load", syncWidth);
    window.addEventListener("resize", syncWidth);
  </script>

</body>
</html>
